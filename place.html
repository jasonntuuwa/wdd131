<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Page - Germany</title>
    <link rel="stylesheet" href="styles/place.css">
</head>

<body>
    <header>
        <h1>Germany</h1>
    </header>
    <main>
        <div class="hero">
            <picture>
                <source media="(min-width: 1000px)" srcset="images/germany-large.webp">
                <source media="(min-width: 500px)" srcset="images/germany-medium.webp">
                <img src="images/germany-small.webp" alt="Landscape view of Germany" width="1500" height="750">
            </picture>
        </div>

        <section class="weather">
            <h2>Weather ⛅</h2>
            <p>Temperature: <span id="temp">8</span>&deg;C</p>
            <p>Wind Speed: <span id="wind">15</span> km/h</p>
            <p>Wind Chill: <span id="windchill"></span></p>
        </section>
        </main>

    <script src="scripts/place.js" defer></script>

    <footer>
        <p>&copy; <span id="year"></span> Germany </p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
